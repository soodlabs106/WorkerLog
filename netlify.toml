[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src 'none'; manifest-src 'self'"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Permissions-Policy = "camera=(), geolocation=(), microphone=()"

[[redirects]]
  from = "/api/admin-reset-password"
  to = "https://yjnbwxneozequrwhzqvg.supabase.co/functions/v1/admin-reset-password"
  status = 200
  force = true

[[headers]]
  for = "/api/admin-reset-password"
  [headers.values]
    Cache-Control = "no-store"
